version: '3.8'

services:
  gateway:
    build: .
    container_name: ai-unified-gateway
    ports:
      # 左侧是你要在阿里云对外暴漏的端口，右侧是容器内部服务端口
      # 如果修改了，请在阿里云安全组也放行对应的外部端口
      - "80:3000"
    restart: always
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      # 这里可以补充其它的强制环境变量，如果 env 里面没有写全的话
